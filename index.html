<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Обычный японский словарь · Ordinary Japanese Dictionary</title>
<link rel="icon" href="/assets/icon.png">
<link rel="alternate" hreflang="ru" href="https://dict.notononoto.com/ru/">
<link rel="alternate" hreflang="en" href="https://dict.notononoto.com/en/">
<link rel="alternate" hreflang="ja" href="https://dict.notononoto.com/ja/">
<link rel="alternate" hreflang="x-default" href="https://dict.notononoto.com/">
<script>
  // Авто-определение языка: русский браузер → /ru/, остальные → /en/.
  (function () {
    var l = (navigator.language || navigator.userLanguage || "").toLowerCase();
    var dest = "/en/";
    if (l.indexOf("ru") === 0) dest = "/ru/";
    else if (l.indexOf("ja") === 0) dest = "/ja/";
    location.replace(dest);
  })();
</script>
<style>
  body { margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; background: #f7f5f1; color: #1f1d1a; }
  .pick { text-align: center; }
  .pick img { width: 56px; height: 56px; border-radius: 13px; }
  .pick a { color: #b4452f; text-decoration: none; font-size: 18px; margin: 0 10px; }
  .pick a:hover { text-decoration: underline; }
  @media (prefers-color-scheme: dark) { body { background: #16140f; color: #f3efe7; } .pick a { color: #e0775f; } }
</style>
</head>
<body>
  <div class="pick">
    <img src="/assets/icon.png" alt="">
    <p>Выберите язык · Choose language</p>
    <p><a href="/ru/">Русский</a> · <a href="/en/">English</a> · <a href="/ja/">日本語</a></p>
  </div>
</body>
</html>
